name: Keep Backend Alive

on:
  schedule:
    - cron: '*/14 * * * *' # Runs every 14 minutes
  workflow_dispatch: # Allows manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend
        run: |
          curl -I https://batchgrad-w5w6.onrender.com
          echo "Backend pinged successfully at $(date)"
